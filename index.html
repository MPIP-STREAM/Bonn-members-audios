<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonn Members – Name Pronunciations</title>
  <style>
    :root {
      --color-error: #fc8181;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      color: #1a365d;
      margin-bottom: 0.4rem;
    }

    header p {
      color: #718096;
      font-size: 1rem;
    }

    .search-bar {
      width: 100%;
      max-width: 560px;
      margin-bottom: 1.5rem;
    }

    .search-bar input {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: #4299e1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }

    .card .name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d3748;
    }

    .card audio {
      width: 100%;
    }

    .card .no-audio {
      font-size: 0.85rem;
      color: #a0aec0;
      font-style: italic;
    }

    .play-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .play-btn:hover { background: #2b6cb0; }
    .play-btn:active { background: #2c5282; }
    .play-btn.error { background: var(--color-error); }

    .play-btn svg { flex-shrink: 0; }

    #no-results {
      display: none;
      color: #718096;
      font-size: 1rem;
      margin-top: 1rem;
    }

    footer {
      margin-top: 3rem;
      color: #a0aec0;
      font-size: 0.8rem;
      text-align: center;
    }

    footer a { color: #4299e1; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>🔊 Bonn Members – Name Pronunciations</h1>
  <p>Click a name to hear how it is pronounced.</p>
</header>

<div class="search-bar">
  <input type="search" id="search" placeholder="Search by name…" aria-label="Search members" />
</div>

<div class="grid" id="grid">
  <!--
    ─────────────────────────────────────────────────────────────────────────
    HOW TO ADD A MEMBER
    ─────────────────────────────────────────────────────────────────────────
    1. Copy the <div class="card"> block below.
    2. Replace "Full Name" with the person's display name.
    3. Replace "audios/filename.mp3" with the path to their audio file.
    4. Remove (or keep) the <p class="no-audio"> line as appropriate.
    ─────────────────────────────────────────────────────────────────────────
  -->

  <div class="card" data-name="yair litman">
    <span class="name">Yair Litman</span>
    <button class="play-btn" data-src="audios/yair_litman.ogg" aria-label="Play Yair Litman"></button>
  </div>

  <div class="card" data-name="yair litman test">
    <span class="name">Yair Litman test</span>
    <button class="play-btn" data-src="audios/yair_litman_test.ogg" aria-label="Play Yair Litman test"></button>
  </div>

  <!-- ADD MORE MEMBERS ABOVE THIS LINE -->
</div>

<p id="no-results">No members match your search.</p>

<footer>
  <p>
    Want to add your name? Send your audio to
    <a href="mailto:litmany@mpip-mainz.mpg.de">Yair Litman</a>
    — or, if you're familiar with git, check the
    <a href="https://github.com/MPIP-STREAM/Bonn-members-audios" target="_blank" rel="noopener">README</a>
    for instructions.
  </p>
</footer>

<script>
  // ── Icon constants (single source of truth) ─────────────────────────────────
  const PAUSE_ICON = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
  </svg>`;
  const PLAY_ICON = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M8 5v14l11-7z"/>
  </svg>`;

  // Initialise every play button with the play icon
  document.querySelectorAll('.play-btn').forEach(btn => {
    btn.innerHTML = PLAY_ICON + ' Play';
  });

  // ── Audio playback ──────────────────────────────────────────────────────────
  let currentAudio = null;
  let currentBtn   = null;

  function resetBtn(btn) {
    if (!btn) return;
    btn.innerHTML = PLAY_ICON + ' Play';
    btn.classList.remove('error');
  }

  document.getElementById('grid').addEventListener('click', function (e) {
    const btn = e.target.closest('.play-btn');
    if (!btn) return;

    const src = btn.dataset.src;

    // Clicking the same button → pause / resume
    if (currentAudio && currentBtn === btn) {
      if (currentAudio.paused) {
        currentAudio.play();
        btn.innerHTML = PAUSE_ICON + ' Pause';
      } else {
        currentAudio.pause();
        btn.innerHTML = PLAY_ICON + ' Play';
      }
      return;
    }

    // Stop any previous audio
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      resetBtn(currentBtn);
    }

    // Play new audio
    currentAudio = new Audio(src);
    currentBtn = btn;
    btn.innerHTML = PAUSE_ICON + ' Pause';

    currentAudio.play().catch(() => {
      // Audio file not found or browser blocked autoplay
      btn.innerHTML = '⚠ Not found';
      btn.classList.add('error');
      currentAudio = null;
      currentBtn = null;
    });

    currentAudio.addEventListener('ended', () => {
      resetBtn(currentBtn);
      currentAudio = null;
      currentBtn = null;
    });
  });

  // ── Search / filter ─────────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', function () {
    const query = this.value.trim().toLowerCase();
    const cards = document.querySelectorAll('.card');
    let visible = 0;

    cards.forEach(card => {
      const match = card.dataset.name.includes(query);
      card.style.display = match ? '' : 'none';
      if (match) visible++;
    });

    document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
  });
</script>

</body>
</html>
